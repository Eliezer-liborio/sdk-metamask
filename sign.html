<!DOCTYPE html>
<html>
<head>
    <title>Assinar Mensagem com MetaMask</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px; }
        button { background: #f6851b; color: white; border: none; padding: 10px 15px; cursor: pointer; }
        pre { background: #f0f0f0; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Assinar Mensagem com MetaMask</h1>
    
    <div>
        <p><strong>Mensagem a ser assinada:</strong></p>
        <pre id="message">Login E-commerce - Nonce: 33</pre>
    </div>

    <button id="connectButton">Conectar MetaMask</button>
    <button id="signButton" disabled>Assinar Mensagem</button>

    <div id="result" style="margin-top: 20px;"></div>

    <script>
        const message = document.getElementById("message").innerText;
        const connectButton = document.getElementById("connectButton");
        const signButton = document.getElementById("signButton");
        const resultDiv = document.getElementById("result");

        // Etapa 1: Conectar à MetaMask
        connectButton.addEventListener("click", async () => {
            if (typeof window.ethereum === 'undefined') {
                resultDiv.innerHTML = "<p style='color: red;'>MetaMask não instalada!</p>";
                return;
            }

            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                resultDiv.innerHTML = `<p>Conectado com: <strong>${accounts[0]}</strong></p>`;
                signButton.disabled = false;
            } catch (error) {
                resultDiv.innerHTML = `<p style='color: red;'>Erro: ${error.message}</p>`;
            }
        });

        // Etapa 2: Assinar a mensagem
        signButton.addEventListener("click", async () => {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length === 0) {
                    resultDiv.innerHTML = "<p style='color: red;'>Nenhuma conta conectada.</p>";
                    return;
                }

                const signature = await window.ethereum.request({
                    method: 'personal_sign',
                    params: [message, accounts[0]],
                });

                resultDiv.innerHTML = `
                    <p>✅ <strong>Assinatura gerada com sucesso!</strong></p>
                    <p><strong>Endereço:</strong> ${accounts[0]}</p>
                    <p><strong>Assinatura:</strong></p>
                    <pre>${signature}</pre>
                    <p>Cole essa assinatura no terminal do seu script Python.</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style='color: red;'>Erro ao assinar: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
